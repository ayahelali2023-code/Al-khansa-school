<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Al Khansaa School</title>
<link rel="icon" type="image/png" href="images/logo.png.jpeg">
    <link rel="stylesheet" href="login.css">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ICONS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo-section">

            <img src="images/logo.png.jpeg" alt="School Logo">

            <h1>Al Khansaa School</h1>

        </div>


        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="about.html">About</a></li>

            <li><a href="contact.html">Contact</a></li>

            <li><a href="login.html" class="active">Login</a></li>

        </ul>

    </nav>


    <!-- LOGIN SECTION -->

    <section class="login-page">

        <!-- LEFT SIDE -->

        <div class="welcome-side">

            <img src="images/logo.png.jpeg" alt="School Logo">

            <h1>Welcome Back!</h1>

            <p>
                Please enter your information<br>
                to continue.
            </p>

        </div>


        <!-- RIGHT SIDE -->

        <div class="login-box">

            <h2>Student Login</h2>

            <div class="small-line"></div>


            <form>

                <!-- NAME -->

                <label>Student Name</label>

                <div class="input-box">

                    <i class="fa-regular fa-user"></i>

                    <input type="text" placeholder="Enter your name">

                </div>


                <!-- CLASS -->

                <label>Class</label>

                <div class="input-box">

                    <i class="fa-solid fa-school"></i>

                    <select>

                        <option>Select your class</option>

                        <option>7th Grade</option>

                        <option>8th Grade</option>

                        <option>9th Grade</option>

                        <option>10th Grade</option>

                        <option>11th Grade</option>

                        <option>12th Grade - Scientific</option>

                        <option>12th Grade - Medical</option>

                        <option>12th Grade - Engineering & Technology</option>

                        <option>12th Grade - Literature & Languages</option>

                        <option>12th Grade - Law & Sharia</option>

                        <option>12th Grade - Business</option>

                        <option>BTEC IT</option>

                        <option>BTEC Business</option>

                    </select>

                </div>


                <!-- BUTTON -->

                <a href="about.html" class="login-btn">

                    Enter

                    <i class="fa-solid fa-arrow-right"></i>

                </a>

            </form>


            <p class="redirect-text">
                After login you will be redirected<br>
                to the About page.
            </p>

        </div>

    </section>


    <!-- FOOTER -->

    <footer>

        <p>© 2026 Al Khansaa School. All Rights Reserved.</p>

    </footer>

</body>

</html>
