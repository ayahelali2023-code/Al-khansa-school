<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Al Khansaa School</title>
    <link rel="icon" type="image/png" href="images/logo.png.jpeg">

    <link rel="stylesheet" href="contact.css">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ICONS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo-section">

            <img src="images/logo.png.jpeg" alt="School Logo">

            <h1>Al Khansaa School</h1>

        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="about.html">About</a></li>

            <li><a href="contact.html" class="active">Contact</a></li>

            <li><a href="login.html">Login</a></li>

        </ul>

    </nav>


    <!-- CONTACT SECTION -->

    <section class="contact-section">

        <h2>Contact Us</h2>

        <div class="line"></div>


        <!-- FORM -->

        <form id="contactForm">

            <div class="top-inputs">

                <!-- NAME -->

                <div class="input-box">

                    <i class="fa-regular fa-user"></i>

                    <input type="text" id="name" placeholder="Your Name">

                </div>


                <!-- CLASS -->

                <div class="input-box">

                    <i class="fa-solid fa-graduation-cap"></i>

                    <select id="class">

                        <option value="">Select your class</option>

                        <option>7th Grade</option>

                        <option>8th Grade</option>

                        <option>9th Grade</option>

                        <option>10th Grade</option>

                        <option>11th Grade</option>

                        <option>12th Grade - Scientific</option>

                        <option>12th Grade - Medical</option>

                        <option>12th Grade - Engineering & Technology</option>

                        <option>12th Grade - Literature & Languages</option>

                        <option>12th Grade - Law & Sharia</option>

                        <option>12th Grade - Business</option>

                        <option>BTEC IT</option>

                        <option>BTEC Business</option>

                    </select>

                </div>

            </div>


            <!-- MESSAGE -->

            <textarea id="message" placeholder="Write your message..."></textarea>


            <!-- SUGGESTIONS -->

            <div class="suggestions">

                <button type="button" class="suggest-btn">
                    Thank you school for the amazing activities 🌸
                </button>

                <button type="button" class="suggest-btn">
                    I really enjoy studying at Al Khansaa School 💙
                </button>

                <button type="button" class="suggest-btn">
                    Thank you teachers for your support and kindness ✨
                </button>

            </div>


            <!-- BUTTON -->

            <button type="submit" class="send-btn">

                <i class="fa-regular fa-paper-plane"></i>

                Send Message

            </button>

        </form>


        <!-- SUCCESS -->

        <div class="success-message" id="successMessage">

            🌸 Message Sent Successfully 🌸

        </div>

    </section>


    <!-- INFO -->

    <section class="info-section">

        <div class="info-box">

            <div class="circle">
                <i class="fa-solid fa-phone"></i>
            </div>

            <div>
                <h3>Phone</h3>
                <p>+962 70-000-000</p>
            </div>

        </div>


        <div class="info-box">

            <div class="circle">
                <i class="fa-solid fa-location-dot"></i>
            </div>

            <div>
                <h3>Location</h3>
                <p>Amman, Jordan</p>
            </div>

        </div>


        <div class="info-box">

            <div class="circle">
                <i class="fa-solid fa-envelope"></i>
            </div>

            <div>
                <h3>Email</h3>
                <p>info@alkhansaa.edu.jo</p>
            </div>

        </div>

    </section>


    <!-- FOOTER -->

    <footer>

        <p>© 2026 Al Khansaa School. All Rights Reserved.</p>

    </footer>


    <script src="contact.js"></script>

</body>

</html>
